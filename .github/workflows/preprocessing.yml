name: Automate Data Preprocessing

on:
  push:
    branches:
      - main 

jobs:
  preprocess-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn numpy

      - name: Run Automate Script
        run: |
          python preprocessing/automate_Zahran.py

      - name: Commit and Push clean data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/dataset_clean.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generate clean dataset" && git push)